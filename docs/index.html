<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Standby - On-Call Log</title>
<style>
  body { margin:0; background:#180C0B; color:#FAEDEB; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:96px 24px; text-align:center; }
  h1 { font-size:2.2rem; margin-bottom:8px; color:#B3211E; }
  p.tag { font-size:1.15rem; opacity:0.85; margin-bottom:40px; }
  .feature { text-align:left; background:rgba(255,255,255,0.04); border-radius:14px; padding:20px 24px; margin-bottom:16px; }
  .feature h3 { margin:0 0 6px 0; color:#B3211E; }
  footer { margin-top:56px; font-size:0.85rem; opacity:0.6; }
  a { color:#B3211E; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #B3211E55 0%, #B3211E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Standby - On-Call Log</h1>
  <p class="tag">Track on-call shifts and emergency callouts for after-hours service work.</p>
  <div class="feature"><h3>Free</h3><p>Log on-call shifts and callout incidents</p></div>
  <div class="feature"><h3>Standby Pro</h3><p>On-call pay calculation and callout-response stats</p></div>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
