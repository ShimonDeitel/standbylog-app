name: Standby
options:
  bundleIdPrefix: com.shimondeitel.standbylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Standby:
    type: application
    platform: iOS
    sources:
      - path: Standby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standbylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Standby/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StandbyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StandbyTests
      - path: Standby.storekit
    dependencies:
      - target: Standby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standbylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StandbyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StandbyUITests
    dependencies:
      - target: Standby
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.standbylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Standby:
    build:
      targets:
        Standby: all
        StandbyTests: [test]
        StandbyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Standby.storekit
    test:
      config: Debug
      storeKitConfiguration: Standby.storekit
      targets:
        - StandbyTests
        - StandbyUITests
    archive:
      config: Release
